spec_version: 1
name: ai-research-scientist
type: environment
runtime: docker

app: server.app:app
port: 7860

description: >
  AI Research Scientist Environment — an OpenEnv-compliant simulation
  of scientific research workflows.

author: Aditya Kumar Singh
version: 1.0.0

# Tasks
tasks:
  - id: task_easy_image_classification
    difficulty: easy
    description: Image classification research with clear performance signals
    max_steps: 12
    grader:
      type: score_based

  - id: task_medium_nlp_sentiment
    difficulty: medium
    description: NLP sentiment analysis with noisy experimental results
    max_steps: 12
    grader:
      type: score_based

  - id: task_hard_tabular_prediction
    difficulty: hard
    description: Tabular prediction with conflicting evidence
    max_steps: 15
    grader:
      type: score_based

# Action Space
action_space:
  type: discrete
  actions:
    - read_paper
    - propose_hypothesis
    - design_experiment
    - run_experiment
    - analyze_results
    - refine_hypothesis
    - final_answer

# Observation Space
observation_space:
  type: structured
  fields:
    - problem_statement
    - available_papers
    - available_datasets
    - available_methods
    - current_hypothesis
    - experiments_run
    - results_history
    - best_accuracy
    - step_count

# Endpoints
endpoints:
  reset: /reset
  step: /step
  state: /state
  health: /health

# Reward
reward:
  type: dense
  description: >
    Step-wise rewards based on experiment improvement and reasoning quality.

# Constraints
constraints:
  max_runtime_minutes: 20
  cpu: 2
  memory_gb: 8

# Determinism
determinism:
  enabled: true
  description: >
    Environment is deterministic with fixed seed.

# Inference
inference:
  entrypoint: inference.py
  description: >
    Runs baseline agent across all tasks.